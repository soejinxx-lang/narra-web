name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium

      # Vercel 배포 완료 대기
      - name: Wait for Vercel deploy
        run: sleep 120

      - name: Run E2E Tests
        run: npx playwright test --config=playwright.ci.ts
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          TEST_RESULTS_API_URL: https://narra-storage.railway.app/api/test-results
          CI: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
